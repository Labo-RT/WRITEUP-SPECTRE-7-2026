<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Spectre-7</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>
    <header class="header d-flex justify-content-between align-items-center px-4">
        <div class="d-flex align-items-center">
            <img src="{{ url_for('static', filename='images/logo.png') }}" class="spectre-logo me-3">
            <h1 class="h4 mb-0 text-white">Spectre-7 Dashboard</h1>
        </div>
    
    </header>


    <main class="container py-5">
        <div class="challenge-box">
            <h2 class="challenge-title">Dashboard</h2>
            <p>Dashboard des users initiés à Spectre-7</p>
            <div class="mt-4">
                <h5 class="text-white">Seuls les admins ont accès à ce dashboard</h5>
                <ul>
                    <li>User: {{ user.user }}</li>
                    <li>Language: {{ user.language }}</li>
                    <li>Newsletter: {{ user.newsletter }}</li>
                </ul>
                <p class="text-info"><a href="/admin">Admin Panel</a></p>
            </div>
        </div>


        <div class="footer text-center">Spectre-7 — footprint</div>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
