<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">
    <div class="p-4 rounded login-box" style="width: 350px;">
        <h3 class="text-center text-danger">Register</h3>
        <form method="post" class="mt-3">
            <input name="username" class="form-control text-dark mb-3" placeholder="Nom d'utilisateur" required/>
            <input type="password" class="form-control text-dark mb-3" placeholder="Mot de passe" required/>
            <select class="form-select" name="language">
                <option value="fr">French</option>
                <option value="en">English</option>
            </select><br><br>
          
            <button class="btn btn-red w-100">Se connecter</button>
        </form>
    </div>
</body>

</html>
